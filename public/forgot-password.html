<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password - ListBoost</title>
    <meta name="description" content="Reset your ListBoost password securely." />
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="toast-region" id="toastRegion" aria-live="polite"></div>
    <main class="auth-shell" id="main">
      <a class="btn btn-ghost auth-back" href="/">Back to home</a>
      <a class="lb-brand" href="/"><img src="/logo.svg" alt="" />ListBoost</a>
      <section class="card auth-card">
        <span class="badge">Password reset</span>
        <h1>Reset password</h1>
        <p>Enter your email and, if an account exists, we will send reset instructions.</p>
        <form id="forgotPasswordForm">
          <label>Email<input name="email" type="email" autocomplete="email" required /><p class="field-error" aria-live="polite"></p></label>
          <button class="btn btn-primary" type="submit">Send reset email</button>
        </form>
        <p class="form-success hidden" id="forgotSuccess">If that email is registered, reset instructions are on the way.</p>
        <p><a href="/login">Back to login</a></p>
      </section>
    </main>
    <script type="module" src="/site.js"></script>
  </body>
</html>
