<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account - ListBoost</title>
    <meta name="description" content="Sign in or create a ListBoost account to generate Vinted listing packages." />
    <meta property="og:title" content="ListBoost account" />
    <meta property="og:description" content="Access your ListBoost credits, history and generated listings." />
    <meta property="og:image" content="https://www.listboost.uk/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="toast-region" id="toastRegion" aria-live="polite"></div>
    <main class="auth-shell" id="main">
      <a class="lb-brand" href="/"><img src="/logo.svg" alt="" />ListBoost</a>
      <section class="card auth-card">
        <span class="badge">Account</span>
        <h1 id="authHeading">Sign in</h1>
        <p>Your credits, history and listings stay with this account.</p>
        <form id="authForm" data-mode="login">
          <label>Email<input name="email" type="email" autocomplete="email" required /><p class="field-error" aria-live="polite"></p></label>
          <label>Password<input name="password" type="password" autocomplete="current-password" minlength="8" required /><p class="field-error" aria-live="polite"></p></label>
          <button class="button primary" type="submit">Sign in</button>
        </form>
        <p id="authLinks"><a href="/signup">Create account</a> | <a href="/forgot-password">Forgot password?</a></p>
      </section>
    </main>
    <script type="module" src="/site.js"></script>
  </body>
</html>
