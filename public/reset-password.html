<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Reset password - ListBoost</title><link rel="stylesheet" href="/styles.css"/></head><body><a class="skip-link" href="#main">Skip to content</a><main class="auth-shell" id="main"><section class="card auth-card" id="resetCard"><img class="auth-logo" src="/logo.svg" alt="ListBoost"/><h1>Choose a new password</h1><p id="resetIntro">Paste the reset token from your email to continue.</p><form id="resetPasswordForm"><label>Reset token<input name="token" autocomplete="one-time-code" required/><p class="field-error" aria-live="polite"></p></label><label>New password<input name="password" type="password" autocomplete="new-password" minlength="8" required/><p class="field-error" aria-live="polite"></p></label><button class="button primary" type="submit">Update password</button></form><p><a href="/login">Back to login</a></p></section><section class="card auth-card hidden" id="resetError"><h1>Reset link expired</h1><p>This reset link is invalid or expired. Request a fresh one from the forgot-password page.</p><a class="button primary" href="/forgot-password">Request new link</a></section></main><script type="module" src="/site.js"></script></body></html>
