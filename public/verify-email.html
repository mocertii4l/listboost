<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify email - ListBoost</title>
    <meta name="description" content="Verify your ListBoost email address before using the app." />
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="toast-region" id="toastRegion" aria-live="polite"></div>
    <main class="auth-shell" id="main">
      <a class="btn btn-ghost auth-back" href="/">Back to home</a>
      <a class="lb-brand" href="/"><img src="/logo.svg" alt="" />ListBoost</a>
      <section class="card auth-card verify-card">
        <span class="badge badge-brand">Email verification</span>
        <h1>Check your email to verify your account</h1>
        <p>We sent a verification link to <strong class="js-email">your account email</strong>. You need to verify before using ListBoost.</p>
        <button class="btn btn-primary" id="resendVerification" type="button">Resend verification email</button>
        <p class="field-helper" id="resendCooldown" aria-live="polite"></p>
        <div class="auth-link-stack">
          <a href="#" data-logout>Wrong email? Sign out</a>
          <a href="/login">Back to login</a>
        </div>
      </section>
    </main>
    <script type="module" src="/site.js"></script>
  </body>
</html>
